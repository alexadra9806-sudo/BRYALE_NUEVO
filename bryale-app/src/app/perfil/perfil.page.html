<ion-content class="profile-page">
  <div class="header">
    <ion-icon name="arrow-back-outline" class="back-icon" (click)="regresar()"></ion-icon>
    <h1>PERFIL</h1>
  </div>

  <div class="content-box">
    <div class="user-card">
      <div class="avatar-box">
        <input
          type="file"
          #fileInput
          accept="image/*"
          hidden
          (change)="seleccionarFoto($event)"
        />

        <img
          *ngIf="fotoPerfil"
          [src]="fotoPerfil"
          class="foto-perfil"
        />

        <ion-icon
          *ngIf="!fotoPerfil"
          name="person-outline"
          class="avatar-person">
        </ion-icon>

        <div class="camera-circle" (click)="fileInput.click()">
          <ion-icon name="camera-outline"></ion-icon>
        </div>

        <p>Añadir foto</p>
      </div>

      <div class="user-info">
        <h2>ADMINISTRADOR</h2>
        <h3>adminbryale&#64;gmail.com</h3>
        <span>Administrador</span>
      </div>
    </div>

    <div class="menu-card">
      <div class="menu-item" (click)="irInformacionPersonal()">
        <ion-icon name="person-outline" class="menu-icon"></ion-icon>
        <p>Información Personal</p>
        <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
      </div>

      <div class="menu-item" (click)="irCambiarPassword()">
        <ion-icon name="lock-closed-outline" class="menu-icon"></ion-icon>
        <p>Cambiar Contraseña</p>
        <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
      </div>

      <div class="menu-item" (click)="irAcercaDe()">
        <ion-icon name="information-circle-outline" class="menu-icon"></ion-icon>
        <p>Acerca de BRYALE</p>
        <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
      </div>

      <div class="menu-item logout" (click)="cerrarSesion()">
        <ion-icon name="log-out-outline" class="menu-icon"></ion-icon>
        <p>Cerrar Sesión</p>
        <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
      </div>
    </div>
  </div>
</ion-content>
